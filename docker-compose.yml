services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: settlebridge
      POSTGRES_PASSWORD: settlebridge
      POSTGRES_DB: settlebridge
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U settlebridge"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://settlebridge:settlebridge@db:5432/settlebridge
      REDIS_URL: redis://redis:6379
      GATEWAY_EXCHANGE_URL: ${A2A_EXCHANGE_URL:-}
      GATEWAY_ENABLED: "true"
      MARKETPLACE_ENABLED: "${MARKETPLACE_ENABLED:-false}"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host

volumes:
  pgdata:
  redisdata:
