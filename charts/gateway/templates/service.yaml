apiVersion: v1
kind: Service
metadata:
  name: {{ include "gateway.fullname" . }}-backend
  labels:
    {{- include "gateway.labels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.gateway.port }}
      targetPort: {{ .Values.gateway.port }}
      protocol: TCP
      name: http
  selector:
    {{- include "gateway.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "gateway.fullname" . }}-dashboard
  labels:
    {{- include "gateway.labels" . | nindent 4 }}
    app.kubernetes.io/component: dashboard
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.dashboard.port }}
      targetPort: {{ .Values.dashboard.port }}
      protocol: TCP
      name: http
  selector:
    {{- include "gateway.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: dashboard
